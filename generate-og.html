<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<script>
const c = document.getElementById('c')
const ctx = c.getContext('2d')
// Background gradient
const grad = ctx.createLinearGradient(0, 0, 1200, 630)
grad.addColorStop(0, '#22c55e')
grad.addColorStop(1, '#16a34a')
ctx.fillStyle = grad
ctx.fillRect(0, 0, 1200, 630)
// Decorative circles
ctx.fillStyle = 'rgba(255,255,255,0.08)'
ctx.beginPath(); ctx.arc(100, 530, 120, 0, Math.PI*2); ctx.fill()
ctx.fillStyle = 'rgba(255,255,255,0.06)'
ctx.beginPath(); ctx.arc(1100, 100, 150, 0, Math.PI*2); ctx.fill()
// Main text
ctx.fillStyle = '#FFFFFF'
ctx.font = 'bold 90px sans-serif'
ctx.fillText('농부ON', 200, 260)
ctx.font = '600 36px sans-serif'
ctx.fillStyle = 'rgba(255,255,255,0.9)'
ctx.fillText('농부를 위한 AI 숏폼 영상 제작', 200, 330)
// Tags
const tags = ['AI 나레이션', 'AI 음성합성', '자동 자막', '사진 효과']
let tx = 200
ctx.font = '600 20px sans-serif'
tags.forEach(tag => {
  const w = ctx.measureText(tag).width + 40
  ctx.fillStyle = 'rgba(255,255,255,0.2)'
  ctx.beginPath(); ctx.roundRect(tx, 370, w, 44, 22); ctx.fill()
  ctx.fillStyle = '#FFFFFF'
  ctx.fillText(tag, tx + 20, 399)
  tx += w + 20
})
// Phone mockup
ctx.strokeStyle = 'rgba(255,255,255,0.3)'
ctx.lineWidth = 3
ctx.fillStyle = 'rgba(0,0,0,0.3)'
ctx.beginPath(); ctx.roundRect(920, 120, 200, 390, 24); ctx.fill(); ctx.stroke()
// Play button
ctx.fillStyle = 'rgba(255,255,255,0.3)'
ctx.beginPath(); ctx.arc(1020, 300, 35, 0, Math.PI*2); ctx.fill()
ctx.fillStyle = '#FFFFFF'
ctx.beginPath(); ctx.moveTo(1010,280); ctx.lineTo(1010,320); ctx.lineTo(1042,300); ctx.closePath(); ctx.fill()
// Tagline
ctx.font = '400 22px sans-serif'
ctx.fillStyle = 'rgba(255,255,255,0.7)'
ctx.fillText('사진만 올리면 AI가 영상을 만들어 드려요', 200, 470)
// Download
const a = document.createElement('a')
a.download = 'og-image.png'
a.href = c.toDataURL('image/png')
a.click()
document.body.innerHTML = '<p>og-image.png downloaded! Copy it to public/ folder.</p>'
</script>
</body>
</html>
