<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1100" cy="100" r="150" fill="rgba(255,255,255,0.06)"/>
  <circle cx="900" cy="500" r="80" fill="rgba(255,255,255,0.05)"/>
  <!-- Film strip icon -->
  <rect x="80" y="200" width="60" height="230" rx="8" fill="rgba(255,255,255,0.2)"/>
  <rect x="88" y="215" width="44" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="88" y="260" width="44" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="88" y="305" width="44" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="88" y="350" width="44" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Main text -->
  <text x="200" y="260" font-family="sans-serif" font-size="90" font-weight="800" fill="white">농부ON</text>
  <!-- Subtitle -->
  <text x="200" y="330" font-family="sans-serif" font-size="36" font-weight="600" fill="rgba(255,255,255,0.9)">농부를 위한 AI 숏폼 영상 제작</text>
  <!-- Feature tags -->
  <rect x="200" y="370" width="160" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
  <text x="280" y="399" font-family="sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">AI 나레이션</text>
  <rect x="380" y="370" width="160" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
  <text x="460" y="399" font-family="sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">AI 음성합성</text>
  <rect x="560" y="370" width="140" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
  <text x="630" y="399" font-family="sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">자동 자막</text>
  <rect x="720" y="370" width="160" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>
  <text x="800" y="399" font-family="sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">사진 효과</text>
  <!-- Phone mockup -->
  <rect x="920" y="120" width="200" height="390" rx="24" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <rect x="935" y="140" width="170" height="350" rx="12" fill="rgba(255,255,255,0.1)"/>
  <!-- Play button in phone -->
  <circle cx="1020" cy="300" r="35" fill="rgba(255,255,255,0.3)"/>
  <polygon points="1010,280 1010,320 1042,300" fill="white"/>
  <!-- Bottom tagline -->
  <text x="200" y="470" font-family="sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)">사진만 올리면 AI가 영상을 만들어 드려요</text>
</svg>